name: Verify

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  scope:
    name: Detect verification scope
    runs-on: ubuntu-latest
    outputs:
      vue: ${{ steps.changes.outputs.vue }}
    steps:
      - name: Checkout Repo
        # checkout@6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect Vue-impacting changes
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}"; then
            echo "vue=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$BASE_SHA" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files.txt"
          if grep -Eq '^(apps/vue-demo/|packages/(runtime|vue)/|scripts/portable-runtime/(contracts/|renderers/|generate-vue-wrappers|check-vue)|package\.json$|pnpm-lock\.yaml$)' "$RUNNER_TEMP/changed-files.txt"; then
            echo "vue=true" >> "$GITHUB_OUTPUT"
          else
            echo "vue=false" >> "$GITHUB_OUTPUT"
          fi

  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Check source and test ownership
        run: pnpm check && pnpm test:homes
      - name: Check release metadata
        run: pnpm styled:versions:check && pnpm primitive:versions:check && pnpm runtime:docs:metadata:check
      - name: Verify Styled Component Version Intent
        if: github.event_name == 'pull_request'
        run: pnpm styled:versions:check --base "${{ github.event.pull_request.base.sha }}"
      - name: Verify Primitive Component Version Intent
        if: github.event_name == 'pull_request'
        run: pnpm primitive:versions:check --base "${{ github.event.pull_request.base.sha }}"
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  node-tests:
    name: Node tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Node suites
        run: pnpm test:node && pnpm runtime:test:unit && pnpm react:test:ssr

  generator-tests:
    name: Generator tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run portable Runtime generator tests
        run: pnpm runtime:generate:test && pnpm runtime:generate:typecheck

  browser-adapter-tests:
    name: Browser adapter tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter=react-demo exec playwright install --with-deps chromium
      - name: Run browser suites
        run: pnpm runtime:test:browser && pnpm react:test:browser

  vue-tests:
    name: Vue verification
    needs: scope
    if: needs.scope.outputs.vue == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter=react-demo exec playwright install --with-deps chromium
      - name: Run quarantined Vue verification
        run: pnpm vue:verify

  build-drift:
    name: Build and generated drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          cache: true
      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate Runtime adapters and CLI registries
        run: pnpm runtime:generate:all && pnpm runtime:registry:generate
      - name: Build repository
        run: pnpm build
      - name: Reject Generated Drift
        run: git diff --exit-code

  verify:
    name: Verify
    if: always()
    needs:
      - scope
      - static
      - node-tests
      - generator-tests
      - browser-adapter-tests
      - vue-tests
      - build-drift
    runs-on: ubuntu-latest
    steps:
      - name: Require every verification gate
        shell: bash
        run: |
          if [[ "${{ needs.scope.result }}" != "success" ||
                "${{ needs.static.result }}" != "success" ||
                "${{ needs.node-tests.result }}" != "success" ||
                "${{ needs.generator-tests.result }}" != "success" ||
                "${{ needs.browser-adapter-tests.result }}" != "success" ||
                "${{ needs.build-drift.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "${{ needs.vue-tests.result }}" != "success" &&
                "${{ needs.vue-tests.result }}" != "skipped" ]]; then
            exit 1
          fi
